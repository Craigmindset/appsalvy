name: Supabase Keepalive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call keepalive endpoint
        run: |
          curl --fail --show-error --silent \
            -H "x-keepalive-secret: ${{ secrets.KEEPALIVE_SECRET }}" \
            "${{ secrets.KEEPALIVE_URL }}"
